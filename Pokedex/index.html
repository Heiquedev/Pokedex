<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Document</title>
</head>

<body>

    <div class="container">
        <figure>
            <img id="imgPokedex" src="./img/Cópia de pokedex.png" alt="">
        </figure>
        <figure>
            <img id="imgPokemon" src="#" alt="Imagem do pokemon">
        </figure>
        <form class="form-busca">
            <input type="text" id="inputText" value="" placeholder="&nbsp;Digite um Pokemon">
        </form>
        <h1 class="pokemon-data1">
            <span>ID</span>
            <span>NomePokémon</span>
        </h1>
        <h1 class="pokemon-data2">
            <div>&nbsp; Tipo:</div>
            <div>&nbsp; Peso: </div>
            <div>&nbsp; Altura: </div>
        </h1>
        <div class="bottons">
            <button id="btnAnterion">Anterior</button>
            <button id="btnProximo">Próximo</button>
        </div>
    </div>


    <script src="./js/script.js"></script>

</body>

</html>
